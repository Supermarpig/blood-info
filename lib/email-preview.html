<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Email 預覽</title></head>
<body style="margin:0;padding:0;background:#f9fafb;font-family:Arial,'Helvetica Neue',sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f9fafb;padding:32px 16px;">
    <tr><td align="center">
      <table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;">

        <!-- Header -->
        <tr><td style="background:#dc2626;border-radius:14px 14px 0 0;padding:28px 32px;text-align:center;">
          <p style="margin:0;font-size:28px;">🩸</p>
          <h1 style="margin:8px 0 4px;color:#fff;font-size:20px;font-weight:700;letter-spacing:0.5px;">捐血資訊平台</h1>
          <p style="margin:0;color:#fecaca;font-size:13px;">bloodtw.com</p>
        </td></tr>

        <!-- Body -->
        <tr><td style="background:#ffffff;padding:32px;">

          <h2 style="margin:0 0 8px;font-size:18px;color:#111827;font-weight:700;">你的回報已成功上線 ✓</h2>
          <p style="margin:0 0 24px;font-size:14px;color:#6b7280;line-height:1.6;">
            感謝你提供捐血贈品資訊，讓更多人能找到划算的捐血活動！
          </p>

          <!-- Event Card -->
          <div style="background:#fff7f7;border:1px solid #fee2e2;border-radius:12px;padding:20px 20px 16px;">
            <p style="margin:0 0 12px;font-size:11px;color:#ef4444;font-weight:600;text-transform:uppercase;letter-spacing:1px;">你的回報內容</p>

            <table cellpadding="0" cellspacing="0" width="100%">
              <tr>
                <td style="padding:6px 0;font-size:13px;color:#6b7280;width:80px;">📅 日期</td>
                <td style="padding:6px 0;font-size:14px;color:#111827;font-weight:600;">2026-05-04</td>
              </tr>
              <tr>
                <td style="padding:6px 0;font-size:13px;color:#6b7280;vertical-align:top;">📍 地點</td>
                <td style="padding:6px 0;font-size:14px;color:#111827;font-weight:600;line-height:1.5;">臺北市信義區松壽路16巷</td>
              </tr>
            </table>

            <div style="margin-top:14px;border-top:1px solid #fee2e2;padding-top:14px;">
              <span style="display:inline-block;background:#fdf2f8;color:#be185d;border:1px solid #fbcfe8;border-radius:999px;padding:3px 12px;font-size:13px;font-weight:500;margin:3px 4px 3px 0;">🎬 電影票</span>
              <span style="display:inline-block;background:#fdf2f8;color:#be185d;border:1px solid #fbcfe8;border-radius:999px;padding:3px 12px;font-size:13px;font-weight:500;margin:3px 4px 3px 0;">🏪 超商</span>
            </div>
          </div>

          <!-- CTA -->
          <div style="text-align:center;margin-top:28px;">
            <a href="https://bloodtw.com" style="display:inline-block;background:#dc2626;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;padding:13px 36px;border-radius:9px;">
              查看活動頁面 →
            </a>
          </div>

        </td></tr>

        <!-- Footer -->
        <tr><td style="background:#f3f4f6;border-radius:0 0 14px 14px;padding:20px 32px;text-align:center;">
          <p style="margin:0;font-size:12px;color:#9ca3af;line-height:1.8;">
            此信件由 <a href="https://bloodtw.com" style="color:#ef4444;text-decoration:none;">bloodtw.com</a> 自動寄出<br>
            你收到此信是因為填寫了回報表單時留下了 Email
          </p>
        </td></tr>

      </table>
    </td></tr>
  </table>

</body>
</html>
