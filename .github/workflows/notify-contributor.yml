name: 通知回報貢獻者

on:
  issues:
    types: [closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    # 只處理 donation-report label 的 Issue
    if: contains(github.event.issue.labels.*.name, 'donation-report')

    steps:
      - name: 解析 Email 並寄送通知
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # 從 Issue body 的 HTML comment 取出 Email
          EMAIL=$(echo "$ISSUE_BODY" | grep -oP '(?<=<!-- CONTRIBUTOR_EMAIL:)[^>]+(?= -->)' | tr -d '[:space:]')

          if [ -z "$EMAIL" ]; then
            echo "此回報無提供 Email，略過通知"
            exit 0
          fi

          echo "寄送通知至: $EMAIL"

          # 從 Issue body 取出地點與日期
          LOCATION=$(echo "$ISSUE_BODY" | grep -oP '(?<=\| 📍 地址 \| ).*' | head -1 | xargs)
          DATE=$(echo "$ISSUE_BODY" | grep -oP '(?<=\| 📅 日期 \| ).*' | head -1 | xargs)
          GIFTS=$(echo "$ISSUE_BODY" | grep -oP '(?<=\| 🏷️ 贈品 \| ).*' | head -1 | xargs)
          IMGUR=$(echo "$ISSUE_BODY" | grep -oP 'https://i\.imgur\.com/[^\)]+' | head -1)

          # 組合贈品 tag HTML
          TAG_HTML=""
          if [ "$GIFTS" != "無" ] && [ -n "$GIFTS" ]; then
            IFS=',' read -ra TAGS <<< "$GIFTS"
            for TAG in "${TAGS[@]}"; do
              T=$(echo "$TAG" | xargs)
              TAG_HTML="${TAG_HTML}<span style='display:inline-block;background:#fdf2f8;color:#be185d;border:1px solid #fbcfe8;border-radius:999px;padding:3px 12px;font-size:13px;font-weight:500;margin:3px 4px 3px 0;'>🎁 ${T}</span>"
            done
          fi

          IMAGE_BLOCK=""
          if [ -n "$IMGUR" ]; then
            IMAGE_BLOCK="<img src='${IMGUR}' alt='贈品圖片' style='width:100%;max-height:220px;object-fit:cover;border-radius:10px;margin:16px 0;display:block;' />"
          fi

          # 寄信
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"捐血資訊平台 <noreply@bloodtw.com>\",
              \"to\": [\"$EMAIL\"],
              \"subject\": \"你的回報已成功上線 ✓\",
              \"html\": \"<!DOCTYPE html><html lang='zh-TW'><head><meta charset='UTF-8'></head><body style='margin:0;padding:0;background:#f9fafb;font-family:Arial,sans-serif;'><table width='100%' cellpadding='0' cellspacing='0' style='background:#f9fafb;padding:32px 16px;'><tr><td align='center'><table width='100%' cellpadding='0' cellspacing='0' style='max-width:520px;'><tr><td style='background:#dc2626;border-radius:14px 14px 0 0;padding:28px 32px;text-align:center;'><p style='margin:0;font-size:28px;'>🩸</p><h1 style='margin:8px 0 4px;color:#fff;font-size:20px;font-weight:700;'>捐血資訊平台</h1><p style='margin:0;color:#fecaca;font-size:13px;'>bloodtw.com</p></td></tr><tr><td style='background:#ffffff;padding:32px;'><h2 style='margin:0 0 8px;font-size:18px;color:#111827;font-weight:700;'>你的回報已成功上線 ✓</h2><p style='margin:0 0 24px;font-size:14px;color:#6b7280;line-height:1.6;'>感謝你提供捐血贈品資訊，讓更多人能找到划算的捐血活動！</p><div style='background:#fff7f7;border:1px solid #fee2e2;border-radius:12px;padding:20px 20px 16px;'><p style='margin:0 0 12px;font-size:11px;color:#ef4444;font-weight:600;letter-spacing:1px;'>你的回報內容</p><table cellpadding='0' cellspacing='0' width='100%'><tr><td style='padding:6px 0;font-size:13px;color:#6b7280;width:80px;'>📅 日期</td><td style='padding:6px 0;font-size:14px;color:#111827;font-weight:600;'>$DATE</td></tr><tr><td style='padding:6px 0;font-size:13px;color:#6b7280;vertical-align:top;'>📍 地點</td><td style='padding:6px 0;font-size:14px;color:#111827;font-weight:600;line-height:1.5;'>$LOCATION</td></tr></table>${TAG_HTML:+<div style='margin-top:14px;border-top:1px solid #fee2e2;padding-top:14px;'>$TAG_HTML</div>}$IMAGE_BLOCK</div><div style='text-align:center;margin-top:28px;'><a href='https://bloodtw.com' style='display:inline-block;background:#dc2626;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;padding:13px 36px;border-radius:9px;'>查看活動頁面 →</a></div></td></tr><tr><td style='background:#f3f4f6;border-radius:0 0 14px 14px;padding:20px 32px;text-align:center;'><p style='margin:0;font-size:12px;color:#9ca3af;line-height:1.8;'>此信件由 <a href='https://bloodtw.com' style='color:#ef4444;text-decoration:none;'>bloodtw.com</a> 自動寄出<br>你收到此信是因為填寫回報表單時留下了 Email</p></td></tr></table></td></tr></table></body></html>\"
            }"

          echo "通知寄送完成"
