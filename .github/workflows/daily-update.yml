name: Daily Blood Donation Data Update

on:
  schedule:
    # Run at 23:40 UTC everyday (07:40 AM Taiwan Time, after blood center updates at 07:31)
    - cron: "40 23 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.14.4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run update script
        run: node scripts/updateData.js
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}

      # 用這次 checkout 剛爬到的 /data 內容直接組貼文，不等下面的 PR merge、
      # 不等站台重新部署。沒設定 THREADS_* secrets 時腳本會自動跳過。
      # continue-on-error：社群發文是錦上添花，失敗不該讓資料更新 workflow 變紅字。
      - name: Post today's recommendation to Threads
        continue-on-error: true
        run: node scripts/postToThreads.js
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update blood donation data"
          title: "chore: update blood donation data"
          body: |
            Automated update of blood donation data.

            - Fetched latest data from blood donation centers
            - Fetched latest PTT Lifeismoney posts

            Auto-generated by GitHub Actions.
          branch: chore/data-update-${{ github.run_id }}
          base: main
          delete-branch: true
          add-paths: |
            data/*

      # 在建立 PR 之後才檢查健康報告：即使有異常（如 PTT 掛掉），
      # 正常爬到的官網資料仍會發 PR，但 workflow 會標記失敗、觸發 GitHub 失敗通知信
      - name: Check data health
        if: always()
        run: |
          if [ ! -f data-health.json ]; then
            echo "::error::找不到 data-health.json，更新腳本可能未完整執行"
            exit 1
          fi
          if [ "$(jq -r '.ok' data-health.json)" != "true" ]; then
            echo "::error::資料健康檢查發現異常："
            jq -r '.anomalies[]' data-health.json | sed 's/^/  - /'
            exit 1
          fi
          echo "資料健康檢查通過"
